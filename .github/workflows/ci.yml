name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.x"
          cache: true
      - name: Install deps
        run: cd apps/mobile && flutter pub get
      - name: Analyze
        run: cd apps/mobile && flutter analyze
      - name: Test
        run: cd apps/mobile && flutter test

  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Build shared-types
        run: cd packages/shared-types && npm ci && npm run build
      - name: Install API deps
        run: cd services/api && npm ci
      - name: Build API
        run: cd services/api && npm run build

  ml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          cd services/ml
          pip install -r requirements.txt pytest
      - name: Test
        run: cd services/ml && PYTHONPATH=. python -m pytest tests/ -v
